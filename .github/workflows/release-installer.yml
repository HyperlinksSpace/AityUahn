# Build Windows installer on CI; publish GitHub Release (asset: aityuahn-installer.exe).
name: Windows installer release

on:
  push:
    branches: [main]
    paths:
      - "python/**"
      - "scripts/**"
      - "pyproject.toml"
      - "config/**"
      - "saas.yaml"
      - ".github/workflows/release-installer.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: aityuahn-installer-release
  cancel-in-progress: true

jobs:
  release:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install -U pip wheel
          pip install pyinstaller
          pip install -e ".[dev]"

      - name: Build aityuahn-installer.exe
        run: python scripts/build_installer.py

      - name: Compute release tag
        id: meta
        run: |
          set -euo pipefail
          ver="$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")"
          tag="v${ver}-build.${{ github.run_number }}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$ver" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ steps.meta.outputs.tag }}"
          ver="${{ steps.meta.outputs.version }}"
          gh release create "$tag" "dist/aityuahn-installer.exe" \
            --repo "${{ github.repository }}" \
            --title "Local forge installer ${ver} (build ${{ github.run_number }})" \
            --notes "Windows local forge installer. Latest: https://github.com/${{ github.repository }}/releases/latest/download/aityuahn-installer.exe — Built from ${{ github.sha }}" \
            --latest

      - name: Summary
        run: |
          echo "Published ${{ steps.meta.outputs.tag }}"
          echo "Latest exe: https://github.com/${{ github.repository }}/releases/latest/download/aityuahn-installer.exe"
